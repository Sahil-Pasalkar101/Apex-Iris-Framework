name: Auto-Generate Leaderboard Submission

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/data.json' # Prevents an infinite loop of actions
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    # Only run if it's a direct push or a MERGED pull request
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install torch pandas numpy cryptography scikit-learn

    - name: Run Processing Script
      run: |
        python baseline.py
      env:
        # Priority: PR User > Person who merged/pushed
        SUBMITTER_NAME: ${{ github.event.pull_request.user.login || github.actor }}

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Pull latest changes to avoid "Rejected" errors
        git pull origin main --rebase
        
        git add submissions/ docs/data.json
        
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "🏆 Auto-update: $SUBMITTER_NAME [skip ci]"
          git push origin main
        else
          echo "No changes to commit."
        fi
      env:
        SUBMITTER_NAME: ${{ github.event.pull_request.user.login || github.actor }}