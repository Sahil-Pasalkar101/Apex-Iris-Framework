name: Apex Leaderboard Automation

on:
  push:
    branches: [ main ]
  pull_request:
    types: [closed]

# 1. This block is the "Master Key" to fix the Red Cross/403 error
permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    # Runs only if PR is merged or if you push directly to main
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Downloads history to prevent "both modified" errors

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install torch pandas scikit-learn numpy cryptography

    - name: Run Processing Script
      env:
        # Detects the contributor's name automatically
        SUBMITTER_NAME: ${{ github.event.pull_request.user.login || github.actor }}
      run: |
        python starter_code/baseline.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Pull latest changes first to avoid conflicts
        git pull origin main --rebase
        
        git add docs/data.json submissions/
        
        # Only commit if there's actually a change (prevents error if score is identical)
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Leaderboard Sync [skip ci]" && git push origin main)
