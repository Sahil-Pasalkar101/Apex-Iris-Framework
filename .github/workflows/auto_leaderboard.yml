name: Apex Leaderboard Automation

on:
  push:
    branches: [ main ]
  pull_request:
    types: [closed]

# Permissions to fix the "403 Forbidden" red cross
permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install torch pandas scikit-learn numpy cryptography

    - name: Run Processing Script
      env:
        SUBMITTER_NAME: ${{ github.event.pull_request.user.login || github.actor }}
      run: |
        # CHANGED: baseline.py is in the root, not in starter_code/
        python baseline.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Sync with remote to prevent non-fast-forward errors
        git pull origin main --rebase
        
        # Added both folders just to be safe based on your structure
        git add docs/data.json submissions/ submission/
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Leaderboard Sync [skip ci]" && git push origin main)
