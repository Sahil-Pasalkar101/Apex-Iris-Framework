name: Apex Leaderboard Automation

on:
  push:
    branches: [ main ]
  # This ensures that when you merge a PR, it triggers as a 'push' to main
  workflow_dispatch: # Allows you to run it manually if needed

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    # This job now runs on every push to main (including merges)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install torch pandas scikit-learn numpy cryptography

    - name: Run Processing Script
      env:
        # CRITICAL: This passes your secret key into baseline.py
        ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        # Logic: If it's a push from a merge, try to find the author. 
        # Fallback to the actor (you) if it's a direct push.
        SUBMITTER_NAME: ${{ github.event.commits[0].author.username || github.actor }}
      run: |
        # --- SHIELD: Physically delete ghost folders in the runner ---
        rm -rf submissions/Satyam_Anilrao_Shelke/
        rm -rf submissions/SatyamShelke2005/
        rm -rf submissions/Test_User_SatyamShelke2005/
        
        # Run the updated baseline.py
        python baseline.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add all changes (metadata, .enc files, and data.json)
        git add -A
        
        # Pull to avoid conflicts, then push
        git pull origin main --strategy-option=theirs
        
        # Only commit if changes exist. [skip ci] prevents infinite loops.
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Leaderboard Sync [skip ci]" && git push origin main)
