name: Apex Leaderboard Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install torch pandas scikit-learn numpy cryptography

    - name: Run Processing Script
      env:
        # Passes your secret key to enable .enc file generation
        ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        # Identify the contributor from the commit
        SUBMITTER_NAME: ${{ github.event.commits[0].author.username || github.actor }}
      run: |
        # Force remove ghost folders in the cloud runner
        rm -rf submissions/SatyamShelke2005/
        rm -rf submissions/Satyam_Anilrao_Shelke/
        rm -rf submissions/Test_User_SatyamShelke2005/
        
        python baseline.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add -A
        
        # Use 'theirs' strategy to automatically fix merge conflicts
        git pull origin main --strategy-option=theirs
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Leaderboard Sync [skip ci]" && git push origin main)
