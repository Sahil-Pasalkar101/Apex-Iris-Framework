<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Iris Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Shared 10s Color Cycle */
        @keyframes colorFlow {
            0%, 100% { 
                --accent: #00ffff; --glow: rgba(0, 255, 255, 0.4); 
                --bg-inner: #001a1a; --border: #008b8b; 
            }
            20% { 
                --accent: #ff3131; --glow: rgba(255, 49, 49, 0.4); 
                --bg-inner: #1a0000; --border: #8b0000; 
            }
            40% { 
                --accent: #ffff00; --glow: rgba(255, 255, 0, 0.4); 
                --bg-inner: #1a1a00; --border: #8b8b00; 
            }
            60% { 
                --accent: #bf00ff; --glow: rgba(191, 0, 255, 0.4); 
                --bg-inner: #11001a; --border: #5d008b; 
            }
            80% { 
                --accent: #ff1493; --glow: rgba(255, 20, 147, 0.4); 
                --bg-inner: #1a000f; --border: #8b0052; 
            }
        }

        :root {
            animation: colorFlow 10s infinite linear;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            background: radial-gradient(circle at center, var(--bg-inner) 0%, #0d1117 100%); 
            color: #c9d1d9; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            padding: 10px;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        
        .container { 
            max-width: 1100px; 
            margin: auto; 
            background: rgba(13, 17, 23, 0.8); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }
        
        .header-section {
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
            margin-bottom: 20px;
            padding-bottom: 15px;
            text-align: center;
        }

        h1 { 
            color: var(--accent); 
            font-size: 1.5rem;
            text-shadow: 0 0 15px var(--glow);
            letter-spacing: 3px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-transform: uppercase;
        }

        h1::before, h1::after {
            content: "";
            width: 30px;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--glow);
        }

        .ranking-policy {
            font-size: 0.65rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: bold;
        }
        .ranking-policy span { color: var(--accent); }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (min-width: 768px) {
            .dashboard-grid { grid-template-columns: 1.2fr 2fr; }
            h1 { font-size: 2.2rem; }
            h1::before, h1::after { width: 60px; height: 3px; }
            body { padding: 20px; }
        }

        .chart-box {
            background: rgba(22, 27, 34, 0.5);
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 320px;
        }

        .stat-mini-card {
            background: #161b22;
            border-left: 4px solid var(--accent);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
            width: 90%;
            transition: border-left 0.3s ease;
        }

        .stat-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.4rem; color: var(--accent); font-weight: bold; }

        .submit-container {
            text-align: center;
            margin-top: 15px;
            width: 90%;
        }

        .submit-btn {
            display: block;
            padding: 12px;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 10px var(--glow);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .submit-btn:hover {
            background: var(--accent) !important;
            color: #0d1117 !important;
            box-shadow: 0 0 25px var(--accent) !important;
            transform: translateY(-2px);
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            border-radius: 8px;
            background: rgba(13, 17, 23, 0.5);
        }

        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid var(--border); color: #8b949e; font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid #21262d; font-size: 0.95rem; }
        
        .badge-pro { 
            border: 1px solid var(--accent); 
            color: var(--accent); 
            padding: 3px 8px; 
            border-radius: 12px; 
            font-size: 0.7rem; 
            background: rgba(255, 255, 255, 0.02);
        }

        .accuracy-highlight { color: #3fb950; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h1>Apex Iris Framework Leaderboard</h1>
            <div class="ranking-policy">Neural ranking protocol: Indexed by <span>System Accuracy</span></div>
        </div>

        <div class="dashboard-grid">
            <div class="chart-box">
                <canvas id="robustnessChart"></canvas>
            </div>
            
            <div class="chart-box" style="justify-content: center; background: none; border: none;">
                <div style="width: 100%;">
                    <div class="stat-mini-card">
                        <div class="stat-label">Peak Model Accuracy</div>
                        <div id="top-accuracy" class="stat-value">--%</div>
                    </div>
                    <div class="stat-mini-card">
                        <div class="stat-label">Neural Engine Status</div>
                        <div id="status-text" class="stat-value">STABLE</div>
                    </div>
                    <div class="stat-mini-card">
                        <div class="stat-label">Total Validated Nodes</div>
                        <div id="user-count" class="stat-value">--</div>
                    </div>
                    <div class="submit-container">
                        <a id="sync-submit-btn" href="https://github.com/SatyamShelke2005/Apex-Iris-Framework/pulls" target="_blank" class="submit-btn">
                            Submit New Score
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Participant</th>
                        <th>Architecture</th>
                        <th>Accuracy</th>
                        <th>F1-Score</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let chartInstance = null;
        let globalData = null;

        function getCSSVariable(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
        }

        function initChart(topModel) {
            const ctx = document.getElementById('robustnessChart').getContext('2d');
            const color = getCSSVariable('--accent');

            chartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Acc', 'Prec', 'Rec', 'Rob', 'Lat'],
                    datasets: [{
                        label: 'Core Metrics',
                        data: [parseFloat(topModel.Accuracy), 88, 72, 65, 90], 
                        backgroundColor: 'rgba(255, 255, 255, 0.02)',
                        borderColor: color,
                        pointBackgroundColor: color,
                        pointBorderColor: '#fff',
                        borderWidth: 2,
                        tension: 0 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            min: 0,
                            max: 100,
                            ticks: { display: false, stepSize: 20 },
                            grid: { color: 'rgba(139, 148, 158, 0.15)' },
                            angleLines: { color: 'rgba(139, 148, 158, 0.15)' },
                            pointLabels: { color: '#8b949e', font: { size: 10, weight: '600' } }
                        }
                    },
                    plugins: { legend: { display: false } },
                    animation: { duration: 0 }
                }
            });
        }

        async function loadLeaderboard() {
            const tableBody = document.getElementById('leaderboard-body');
            try {
                const response = await fetch('./data.json');
                globalData = await response.json();
                
                // Fixed key names to match baseline.py (Accuracy)
                globalData.sort((a, b) => parseFloat(b.Accuracy) - parseFloat(a.Accuracy));

                document.getElementById('top-accuracy').innerText = globalData[0].Accuracy;
                document.getElementById('user-count').innerText = globalData.length;
                
                tableBody.innerHTML = '';
                globalData.forEach((entry, index) => {
                    const row = document.createElement('tr');
                    let rankDisplay = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`;
                    
                    // Fixed keys: Participant, Architecture, Accuracy, F1-Score, Timestamp
                    row.innerHTML = `
                        <td style="${index < 3 ? 'font-size: 1.2rem;' : 'color: #8b949e;'}">${rankDisplay}</td>
                        <td style="font-weight:600;">${entry.Participant}</td>
                        <td><span class="badge-pro">${entry.Architecture || 'Neural-X'}</span></td>
                        <td class="accuracy-highlight">${entry.Accuracy}</td>
                        <td style="color: #8b949e;">${entry['F1-Score'] || '--'}</td>
                        <td style="color: #8b949e; font-size: 0.75rem;">${entry.Timestamp}</td>
                    `;
                    tableBody.appendChild(row);
                });

                if (!chartInstance) initChart(globalData[0]);
            } catch (e) { 
                console.error("Neural Link Failure:", e);
                document.getElementById('status-text').innerText = "OFFLINE";
            }
        }

        setInterval(() => {
            const currentAccent = getCSSVariable('--accent');
            const currentGlow = getCSSVariable('--glow');
            
            if (chartInstance) {
                chartInstance.data.datasets[0].borderColor = currentAccent;
                chartInstance.data.datasets[0].pointBackgroundColor = currentAccent;
                chartInstance.update('none'); 
            }

            const submitBtn = document.getElementById('sync-submit-btn');
            if(submitBtn) {
                if (submitBtn.parentElement.querySelector(':hover') !== submitBtn) {
                    submitBtn.style.borderColor = currentAccent;
                    submitBtn.style.color = currentAccent;
                    submitBtn.style.boxShadow = `0 0 10px ${currentGlow}`;
                } else {
                    submitBtn.style.borderColor = currentAccent;
                }
            }
        }, 50);

        loadLeaderboard();
    </script>
</body>
</html>
